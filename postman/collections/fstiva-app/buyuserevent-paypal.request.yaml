$kind: http-request
name: buyuserevent-paypal
url: http://localhost:5001/api/userevents
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{jwt_token}}
body:
  type: json
  content: "{\r
    \    \"eventId\": \"{{event_id}}\",\r
    \    \"price\": 100,\r
    \    \"paymenttype\": \"paypal\"\r
    }"
scripts:
  - type: afterResponse
    code: "let response = pm.response.json();\r
      pm.test(\"Status code is 201\", function () {\r
      pm.response.to.have.status(201);\r
      });\r
      pm.test(\"Response contains booked event\", function () {\r
      pm.expect(pm.response.text()).to.include(\"price\");\r
      });\r
      pm.test(\"PayPal payment was processed via Factory+Strategy\", function () {\r
      pm.expect(response).to.have.property(\"_id\");\r
      });"
    language: text/javascript
order: 4500394779478174