name: Backend CI - Live

on:
  push:
    branches:
      - main # Trigger CI on pushes to the main production branch

jobs:
  test:
    name: Run Tests & Deploy Live
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [22]

    # Maps to production environment secrets
    environment: production 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        clean: false  # Prevents Git from deleting your untracked .env file

    # Set up Node.js
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}

    - name: Print Env Secret
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        PORT: 3000 # Production port
      run: | 
        echo "Secret 1 is: $MONGO_URI"
        echo "Secret 2 is: $JWT_SECRET"
        echo "Secret 3 is: $PORT"

    # Install dependencies for backend
    - name: Install Backend Dependencies
      working-directory: ./backend
      run: |
       npm install --global yarn
       yarn --version
       yarn install --frozen-lockfile
      
    # Install dependencies for frontend
    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: |
        df -h
        sudo rm -rf ./build
        yarn install --frozen-lockfile
        CI=''
        yarn run build

    # Run backend tests
    - name: Run Backend Tests
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        PORT: 3000 # Runs tests on the production port
      working-directory: ./backend
      run: npm test

    # CRITICAL NEW STEP: Sync built production files to the dedicated Live folder
    - name: Sync Production Code to Live App Directory
      run: |
        mkdir -p ~/www/live-app
        rsync -avz --delete ./ ~/www/live-app/

    # Safely start/restart ONLY the live process on port 3000
    - name: Start or Reload Live Application
      run: |
        cd ~/www/live-app
        PORT=3000 pm2 reload react-live-app || PORT=3000 pm2 start ./backend/server.js --name "react-live-app"
        pm2 save
