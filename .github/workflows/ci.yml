name: Backend CI - Dev

on:
  push:
    branches:
      - develop # Trigger CI on pushes to the development branch

jobs:
  test:
    name: Run Tests & Deploy Dev
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [22]

    # Explicitly maps to a GitHub environment if you want to use environment-specific secrets
    environment: development 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        clean: false  # Prevents Git from deleting your untracked .env file

    # Set up Node.js
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}

    - name: Print Env Secret
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        PORT: 4000 # Hardcoded or use secrets.DEV_PORT to isolate from Live
      run: | 
        echo "Secret 1 is: $MONGO_URI"
        echo "Secret 2 is: $JWT_SECRET"
        echo "Secret 3 is: $PORT"

    # Install dependencies for backend
    - name: Install Backend Dependencies
      working-directory: ./backend
      run: |
       npm install --global yarn
       yarn --version
       yarn install --frozen-lockfile
      
    # Install dependencies for frontend
    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: |
        df -h
        sudo rm -rf ./build
        yarn install --frozen-lockfile
        CI=''
        yarn run build

    # Run backend tests
    - name: Run Backend Tests
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        PORT: 4000 # Runs tests on the dev port
      working-directory: ./backend
      run: npm test

    # Safely start/restart ONLY the dev process without touching the production app
    # If the app is using an ecosystem.config.js file, specify it. Otherwise, this targets the process name.
    # We pass the DEV port (4000) directly into the runtime execution context.
    - name: Start or Reload Dev Application
      run: |
        PORT=4000 pm2 reload react-dev-app || PORT=4000 pm2 start ./backend/server.js --name "react-dev-app"
        pm2 save